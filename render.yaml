services:
  - type: web
    name: breast-cancer-detection
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --bind 0.0.0.0:$PORT run:app
    autoDeploy: true
    plan: starter
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breast-cancer-db
          property: connectionString

databases:
  - name: breast-cancer-db
    databaseName: breast_cancer_detection
    user: breast_cancer_user
    plan: starter